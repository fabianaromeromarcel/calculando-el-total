<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafío 1 - JavaScript</title>
    <link rel="stylesheet" href="./assets/estilos.css">
</head>

<body>

    <section>
        <div class="card">
            <div class="img-card"></div>
              <h6>Laptop Gamer AMD</h6>
              <p>Precio base: $<span class="precio-inicial"></span></p>
              <p>Cantidad:
                <span class="cantidad">0</span>
                <button onclick="
                    var cantidad = document.querySelector('.cantidad');
                    var cantidadactual = Number(cantidad.innerHTML) + 1;
                    cantidad.innerHTML = cantidadactual;
                    var total = document.querySelector('.valor-total'); 
                    total.innerHTML = precio * cantidadactual;
                    "
                >+</button>
                <button onclick="
                    var cantidad = document.querySelector('.cantidad');
                    var cantidadactual = Number(cantidad.innerHTML) - 1;
                    cantidad.innerHTML = cantidadactual;
                    var total = document.querySelector('.valor-total');
                    total.innerHTML = precio * cantidadactual;
                    "
                >-</button>
              </p>
            </div>
        </div>
    </section>

    <div class="total-section">
        <p>Total a pagar: $<span class="valor-total"></span> </p>
    </div>

    <script src="./assets/script.js">
    </script>
</body>
</html>
